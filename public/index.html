<!DOCTYPE html>
<html>
<head>
  <title>CashMoneyGoats Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="navbar">
    <div class="logo">CashMoneyGoats</div>

    <div class="menu">
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('info')">Info</button>
      <button onclick="showPage('logs')">Logs</button>
      <button onclick="openOwnerConfig()">Owner Config</button>
    </div>
  </div>

  <div id="content"></div>

  <div id="ownerModal" class="modal">
    <div class="modal-box">
      <h2>Owner Access</h2>
      <input id="codeInput" placeholder="Enter Code">
      <button onclick="checkCode()">Enter</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
